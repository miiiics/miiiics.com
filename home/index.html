  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap');

    @font-face {
      font-family: 'Coolvetica';
      src: url('../assets/fonts/Coolvetica Rg.otf') format('opentype');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }

    *, *::before, *::after { box-sizing: border-box; }

    html { background: #1c1c1c; }

    body {
      margin: 0;
      overflow-x: hidden;
      background: transparent;
      color: #e8e8e8;
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 18px;
      line-height: 1.7;
    }

    a {
      color: #e8e8e8;
      text-decoration: none;
    }

    a:hover {
      color: #38b038;
      text-decoration: underline;
    }

    /* ── Site header ── */
    .site-header {
      background: linear-gradient(to bottom, #1c1c1c, #050505);
      border-bottom: 2px solid #2d8c2d;
      padding: 2.1rem calc(1.5rem + env(safe-area-inset-right)) 0 calc(1.5rem + env(safe-area-inset-left));
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.85), 0 2px 6px rgba(0, 0, 0, 0.6);
      transition: padding 0.25s ease, background 0.25s ease;
    }

    .site-header-inner {
      max-width: 720px;
      margin: 0 auto;
    }

    .site-title {
      margin: 0;
      font-size: 3rem;
      line-height: 1;
      font-weight: 900;
      letter-spacing: 0.08em;
      font-family: 'Bebas Neue', Georgia, serif;
      transition: font-size 0.25s ease;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.7);
    }

    .site-title a {
      color: #e8e8e8;
      line-height: 1;
    }

    .site-title a:hover {
      text-decoration: none;
      color: #38b038;
    }

    .logo-i, .logo-s {
      display: inline-block;
      transform-origin: 50% 88%;
    }

    .logo-i-outer { transform: scaleY(1.05); }
    .logo-i-inner { transform: scaleY(1.10); }
    .logo-s { transform: scaleY(0.92); }
    .logo-m { display: inline-block; clip-path: polygon(0% 20%, 100% 0%, 100% 100%, 0% 100%); }

    .title-com {
      font-size: 0.5em;
      vertical-align: baseline;
    }

    .site-tagline {
      margin: 0.25rem 0 0.45rem;
      font-size: 0.95rem;
      color: #777;
      font-style: italic;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
      max-height: 3rem;
      opacity: 1;
      transition: max-height 0.25s ease, opacity 0.2s ease, margin 0.25s ease;
    }

    .site-header.header-compact {
      padding: 0.1rem calc(1.5rem + env(safe-area-inset-right)) 0.1rem calc(1.5rem + env(safe-area-inset-left));
      background: linear-gradient(to bottom, #111111, #020202);
    }

    .site-header.header-compact .site-header-inner {
      display: flex;
      align-items: center;
      max-width: none;
      margin: 0;
    }

    .site-header.header-compact .site-title {
      font-size: 1.2rem;
      padding-right: 0.75rem;
      white-space: nowrap;
      flex-shrink: 0;
      position: relative;
      z-index: 2;
      background: inherit;
    }

    .site-header.header-compact .site-tagline {
      max-height: 0;
      opacity: 0;
      margin: 0;
    }

    .site-header.header-compact .site-nav {
      margin-top: 0;
      flex: 1;
      justify-content: flex-start;
      min-width: 0;
    }

    .site-header.header-compact .site-nav a:first-child {
      margin-left: auto;
    }

    .site-header.header-compact .site-nav a {
      padding: 0.25rem 0.75rem;
    }

    .site-header::before {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 100%;
      background: radial-gradient(ellipse var(--blip-spread, 22%) 100% at var(--blip-pct, -10%) 100%, rgba(45, 140, 45, 0.15) 0%, rgba(45, 140, 45, 0.05) 50%, transparent 90%);
      opacity: var(--blip-alpha, 0);
      pointer-events: none;
      z-index: -1;
    }

    .site-header::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      width: 12%;
      height: 2px;
      background: linear-gradient(to right, transparent 0%, rgba(56, 210, 56, 0.8) 100%);
      transform: translateX(calc(var(--blip-tx, -100) * 1%));
      opacity: var(--blip-alpha, 0);
      pointer-events: none;
    }

    /* ── Nav ── */
    .site-nav {
      display: flex;
      justify-content: space-between;
      margin-top: 0.25rem;
      overflow-x: auto;
      scrollbar-width: none;
      overscroll-behavior-x: contain;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 3px;
      -webkit-mask-image: linear-gradient(to right, transparent 0%, black var(--fade-l, 0%), black calc(100% - var(--fade-r, 0%)), transparent 100%);
      mask-image: linear-gradient(to right, transparent 0%, black var(--fade-l, 0%), black calc(100% - var(--fade-r, 0%)), transparent 100%);
    }

    .site-nav::-webkit-scrollbar { display: none; }

    .site-nav a {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      color: #888;
      padding: 0.6rem 1rem;
      text-decoration: none;
      position: relative;
      transform: translateY(0);
      transition:
        color 0.22s ease,
        transform 0.18s ease,
        text-shadow 0.22s ease;
    }

    .site-nav a::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 1rem;
      right: 1rem;
      height: 3px;
      background: #38b038;
      border-radius: 2px 2px 0 0;
      transform: scaleX(0);
      transform-origin: left center;
      transition: transform 0.22s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .site-nav a:hover {
      color: #5fd65f;
      text-decoration: none;
      transform: translateY(-2px);
      text-shadow:
        0 0 12px rgba(56, 176, 56, 0.45),
        0 0 24px rgba(56, 176, 56, 0.18);
    }

    .site-nav a:hover::after {
      transform: scaleX(1);
    }

    .site-nav a.nav-active {
      color: #2d8c2d;
      font-weight: 700;
      text-decoration: none;
      transform: translateY(0);
      text-shadow: none;
      transition:
        color 0.22s ease,
        transform 0.18s ease,
        text-shadow 0.22s ease;
    }

    .site-nav a.nav-active::after {
      transform: scaleX(1);
      background: #2d8c2d;
      transition: none;
    }

    /* ── Main content ── */
    main {
      max-width: 720px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem 4rem;
    }

    /* ── Post card ── */
    .post {

    }

    .post:last-child {

    .post-meta {

      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 0.8rem;
      color: #777;
      margin-bottom: 0.5rem;
    }

    .badge {
      display: inline-block;

      padding: 0.15em 0.55em;

      letter-spacing: 0.03em;

      text-decoration: none;
    }

    .badge:hover {

    }

    .badge-music    { background: #3d1a2e; color: #d4699a; }
    .badge-art      { background: #1e1535; color: #9b7ed4; }
    .badge-pokemon  { background: #2e2100; color: #c49a3c; }
    .badge-projects { background: #0d2318; color: #3aa87a; }
    .badge-misc     { background: #1a1f2e; color: #7a93c4; }
    .badge-youtube  { background: #2a0d0d; color: #c45c5c; }

    .post-title {
      margin: 0 0 0.6rem;
      font-family: 'Coolvetica', sans-serif;
      font-size: 1.45rem;
      font-weight: normal;
      line-height: 1.25;
      text-shadow: 0 1px 4px rgba(0, 0, 0, 0.6);
    }

    .post-title a {
      color: #e8e8e8;
    }

    .post-title a:hover {

    }

    .post-excerpt {
      font-size: 0.97rem;

    /* ── Video embed ── */
    .video-wrapper {
      position: relative;
      padding-bottom: 56.25%; /* 16:9 */
      height: 0;
      overflow: hidden;
      margin-bottom: 1rem;

      border-top-color: #3a3a3a;
      border-left-color: #3a3a3a;
      border-bottom-color: #111111;
      border-right-color: #111111;
      box-shadow:
        0 4px 16px rgba(0, 0, 0, 0.8),

    .video-wrapper iframe {
      position: absolute;
      top: 0; left: 0;

    /* ── Footer ── */
    .site-footer {
      border-top: 1px solid #2a2a2a;

      text-align: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;

    #bg-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      pointer-events: none;
    }
  </style>

  <script>
    (function () {
      const canvas = document.createElement('canvas');
      canvas.id = 'bg-canvas';
      document.body.prepend(canvas);
      const ctx = canvas.getContext('2d');
      const COUNT = 55;
      const particles = [];
      let t = 0;
      function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      window.addEventListener('resize', resize);
      window.addEventListener('orientationchange', function() { setTimeout(resize, 50); });
      if (window.visualViewport) window.visualViewport.addEventListener('resize', resize);
      resize();
      for (let i = 0; i < COUNT; i++) {
        particles.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          r: Math.random() * 2.5 + 1.5,
          speed: Math.random() * 0.3 + 0.1,
          drift: (Math.random() - 0.5) * 0.2,
          baseOpacity: Math.random() * 0.35 + 0.25,
          baseBlur: Math.random() * 16 + 22,
          phase: Math.random() * Math.PI * 2,
          pulseSpeed: Math.random() * 0.012 + 0.006
        });
      }
      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        t += 1;
        for (const p of particles) {
          const pulse = Math.sin(t * p.pulseSpeed + p.phase);
          const opacity = p.baseOpacity + pulse * 0.15;
          const blur = p.baseBlur + pulse * 10;
          ctx.shadowColor = 'rgba(56, 210, 56, 0.85)';
          ctx.shadowBlur = blur;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(56, 200, 56, ${Math.max(0.08, opacity)})`;
          ctx.fill();
          ctx.shadowBlur = 0;
          p.y -= p.speed;
          p.x += p.drift;
          if (p.y + p.r < 0) { p.y = canvas.height + p.r; p.x = Math.random() * canvas.width; }
          if (p.x < -p.r) p.x = canvas.width + p.r;
          if (p.x > canvas.width + p.r) p.x = -p.r;
        }
        requestAnimationFrame(draw);
      }
      draw();
    })();
  </script>
  <script>
    (function () {
      var hdr = document.querySelector('.site-header');
      if (!hdr) return;
      var navAs = Array.from(hdr.querySelectorAll('.site-nav a'));
      var title = hdr.querySelector('.site-title');
      var tagline = hdr.querySelector('.site-tagline');
      var cooling = false;
      function flipNav(compact) {
        cooling = true;
        if (tagline) {
          tagline.style.transition = 'none';
          tagline.style.opacity = '0';
          tagline.style.maxHeight = '0';
          tagline.style.margin = '0';
          tagline.style.flex = '0 0 0';
          tagline.style.minWidth = '0';
        }
        navAs.forEach(function(a) { a.style.transition = 'none'; a.style.transform = ''; });
        if (title) { title.style.transition = 'none'; title.style.transform = ''; }
        var firsts = navAs.map(function(a) { return a.getBoundingClientRect(); });
        var tFirst = title ? title.getBoundingClientRect() : null;
        hdr.classList.toggle('header-compact', compact);
        navAs.forEach(function(a, i) {
          a.style.transform = 'translateX(' + (firsts[i].left - a.getBoundingClientRect().left).toFixed(1) + 'px)';
        });
        if (title && tFirst) {
          var tLast = title.getBoundingClientRect();
          title.style.transform = 'translateX(' + (tFirst.left - tLast.left).toFixed(1) + 'px) translateY(' + (tFirst.top - tLast.top).toFixed(1) + 'px)';
        }
        if (navAs.length) navAs[0].offsetHeight; else if (title) title.offsetHeight;
        var ease = '0.4s cubic-bezier(0.42, 0, 0.58, 1)';
        navAs.forEach(function(a) { a.style.transition = 'transform ' + ease; a.style.transform = ''; });
        if (title) { title.style.transition = 'transform ' + ease; title.style.transform = ''; }
        var done = false;
        function cleanup() {
          if (done) return; done = true;
          navAs.forEach(function(a) { a.style.transition = ''; a.style.transform = ''; });
          if (title) { title.style.transition = ''; title.style.transform = ''; }
          if (tagline) {
            tagline.style.transition = '';
            tagline.style.flex = '';
            tagline.style.minWidth = '';
            if (!compact) {
              requestAnimationFrame(function() {
                tagline.style.opacity = '';
                tagline.style.maxHeight = '';
                tagline.style.margin = '';
              });
            } else {
              tagline.style.opacity = '';
              tagline.style.maxHeight = '';
              tagline.style.margin = '';
            }
          }
          cooling = false;
        }
        if (navAs.length) {
          navAs[0].addEventListener('transitionend', function h() {
            navAs[0].removeEventListener('transitionend', h);
            cleanup();
          });
        }
        setTimeout(cleanup, 500);
      }
      window.addEventListener('scroll', function () {
        if (cooling) return;
        var c = window.scrollY > 10;
        if (hdr.classList.contains('header-compact') !== c) flipNav(c);
      }, { passive: true });
      if (window.scrollY > 10) hdr.classList.add('header-compact');
    }());
  </script>
  <script>
    (function () {
      var hdr = document.querySelector('.site-header');
      if (!hdr) return;
      var CYCLE = 10000, IDLE = 0.425, FADE = 0.05;
      function ease(t) { return t < 0.5 ? 2*t*t : -1+(4-2*t)*t; }
      function tick(ts) {
        var p = (ts % CYCLE) / CYCLE, tx, alpha, spread;
        if (p <= IDLE || p >= 1 - IDLE) {
          tx = p <= IDLE ? -100 : 900;
          alpha = 0; spread = 20;
        } else {
          var t = (p - IDLE) / (1 - 2 * IDLE);
          tx = -100 + ease(t) * 1000;
          alpha = t < FADE ? t / FADE : t > 1 - FADE ? (1 - t) / FADE : 1;
          var vel = (t < 0.5 ? 4*t : 4 - 4*t) / 2;
          spread = 22 + vel * 50;
        }
        hdr.style.setProperty('--blip-tx', tx.toFixed(1));
        hdr.style.setProperty('--blip-alpha', alpha.toFixed(3));
        hdr.style.setProperty('--blip-pct', (0.12 * tx + 6).toFixed(1) + '%');
        hdr.style.setProperty('--blip-spread', spread.toFixed(1) + '%');
        requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);
    })();
  </script>
  <script>
    (function () {
      var nav = document.querySelector('.site-nav');
      if (!nav) return;
      function updateFades() {
        var left = nav.scrollLeft;
        var max = nav.scrollWidth - nav.clientWidth;
        nav.style.setProperty('--fade-l', (max > 0 && left > 2) ? '7%' : '0%');
        nav.style.setProperty('--fade-r', (max > 0 && left < max - 2) ? '7%' : '0%');
      }
      window.addEventListener('resize', function() { requestAnimationFrame(updateFades); });
      requestAnimationFrame(updateFades);
      var rubber = 0, bouncing = false;
      var prevLeft = nav.scrollLeft, vel = 0;
      function doSpring(amount) {
        bouncing = true;
        nav.style.transition = 'none';
        nav.style.transform = 'translateX(' + amount.toFixed(1) + 'px)';
        requestAnimationFrame(function() {
          nav.style.transition = 'transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1)';
          nav.style.transform = '';
          setTimeout(function() { bouncing = false; nav.style.transition = ''; }, 560);
        });
      }
      function release() {
        if (rubber === 0) return;
        rubber = 0;
        nav.style.transition = 'transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1)';
        nav.style.transform = '';
        setTimeout(function() { nav.style.transition = ''; }, 560);
      }
      nav.addEventListener('scroll', function() {
        var left = nav.scrollLeft;
        var max = nav.scrollWidth - nav.clientWidth;
        var delta = left - prevLeft;
        vel = vel * 0.4 + delta * 0.6;
        if (!bouncing && rubber === 0) {
          if (left <= 0 && prevLeft > 1 && vel < -4) {
            doSpring(Math.min(-vel * 0.55, 28));
          } else if (max > 0 && left >= max - 1 && prevLeft < max - 1 && vel > 4) {
            doSpring(Math.max(-vel * 0.55, -28));
          }
        }
        prevLeft = left;
        updateFades();
      }, { passive: true });
      nav.addEventListener('wheel', function(e) {
        if (Math.abs(e.deltaX) < 1) return;
        var max = nav.scrollWidth - nav.clientWidth;
        if (max <= 0) return;
        var atStart = nav.scrollLeft <= 0;
        var atEnd = nav.scrollLeft >= max - 1;
        if ((atStart && e.deltaX < 0) || (atEnd && e.deltaX > 0)) {
          e.preventDefault();
          rubber -= e.deltaX * 0.25;
          rubber = Math.max(-28, Math.min(28, rubber));
          nav.style.transition = 'none';
          nav.style.transform = 'translateX(' + rubber.toFixed(1) + 'px)';
        } else {
          release();
        }
      }, { passive: false });
      nav.addEventListener('mouseleave', release);
    }());
  </script>
